name: Claude Review - AI OS Inheritance Implementation

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write

jobs:
  review:
    if: github.event.pull_request.number == 8
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Independent implementation review
        id: claude
        uses: anthropics/claude-code-action@6902c227aaa9536481b99d56f3014bbbad6c6da8
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          prompt: |
            Complete an independent review of PR #8 against Issue #7.
            Read Issue #7, PR metadata, and the full diff. Check tracking and pinned
            behavior, read-only guarantees, action pinning, stale revision handling,
            and every acceptance criterion. Do not edit files, comment, or merge.
            Return only the requested JSON object.
          claude_args: |
            --max-turns 24
            --allowedTools "Bash(gh issue view:*),Bash(gh pr view:*),Bash(gh pr diff:*)"
            --disallowedTools "Edit,Write,NotebookEditCell"
            --json-schema '{"type":"object","properties":{"verdict":{"type":"string","enum":["APPROVE","REQUEST_CHANGES"]},"findings":{"type":"string"},"required_changes":{"type":"string"}},"required":["verdict","findings","required_changes"]}'

      - name: Publish and enforce verdict
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ steps.claude.outputs.structured_output }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          test -n "$RESULT"
          verdict=$(printf '%s' "$RESULT" | jq -er '.verdict')
          findings=$(printf '%s' "$RESULT" | jq -er '.findings')
          changes=$(printf '%s' "$RESULT" | jq -er '.required_changes')

          body=$(printf '### Claude independent review\n\n**Verdict: %s**\n\n#### Findings\n%s\n\n#### Required changes\n%s' "$verdict" "$findings" "$changes")
          gh api --method POST "/repos/$REPO/issues/$PR/comments" -f body="$body"

          {
            echo '### Claude independent review'
            echo
            echo "**Verdict: $verdict**"
            echo
            echo '#### Findings'
            echo "$findings"
            echo
            echo '#### Required changes'
            echo "$changes"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Claude verdict: $verdict"
          if [ "$verdict" = "REQUEST_CHANGES" ]; then
            echo "::error::Claude requested changes. See the PR comment and job summary."
            exit 1
          fi
