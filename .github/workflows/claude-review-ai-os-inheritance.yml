name: Claude Review - AI OS Inheritance Implementation

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write

jobs:
  review:
    if: github.event.pull_request.number == 8
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Independent implementation review
        uses: anthropics/claude-code-action@6902c227aaa9536481b99d56f3014bbbad6c6da8
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          track_progress: true
          use_sticky_comment: true
          prompt: |
            Complete the independent review of PR #8 against Issue #7.
            Read Issue #7, PR metadata, and the full diff. Focus on tracking and pinned
            behavior, read-only guarantees, action pinning, stale revision handling,
            and whether the implementation satisfies every acceptance criterion.
            Do not edit files or merge. Finish this run with a final verdict containing
            APPROVE or REQUEST_CHANGES, concise findings, and required changes if any.
          claude_args: |
            --max-turns 24
            --allowedTools "Bash(gh issue view:*),Bash(gh pr view:*),Bash(gh pr diff:*)"
            --disallowedTools "Edit,Write,NotebookEditCell"
