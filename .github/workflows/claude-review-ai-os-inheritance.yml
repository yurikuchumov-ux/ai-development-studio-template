name: Claude Review - AI OS Inheritance Implementation

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    if: github.event.pull_request.number == 8
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Independent implementation review
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Independently review PR #8 against Issue #7 and ai-operating-system PR #11.
            Read only PR metadata and diff. Check the reference template, validator, reusable workflow,
            tracking/pinned behavior, stale revision warning, read-only guarantees, action pinning,
            and adoption documentation. Do not edit files or merge.
            Post exactly one concise PR comment using gh pr comment with:
            verdict: APPROVE or REQUEST_CHANGES; findings; required changes if any.
          claude_args: |
            --max-turns 3
            --allowedTools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*)"
            --disallowedTools "Edit,Write,NotebookEditCell"
