name: Validate AI OS inheritance

on:
  pull_request:
    paths:
      - 'AI_OS_REFERENCE.md'
      - 'PROJECT_RULES.md'
      - '.github/scripts/validate-ai-os-reference.mjs'
      - '.github/workflows/validate-ai-os-inheritance.yml'
  push:
    branches: [main]
    paths:
      - 'AI_OS_REFERENCE.md'
      - 'PROJECT_RULES.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Validate reference contract
        run: node .github/scripts/validate-ai-os-reference.mjs AI_OS_REFERENCE.md

      - name: Validate canonical source and pinned revision
        shell: bash
        run: |
          set -euo pipefail
          mode=$(sed -n 's/^- Mode: `\([^`]*\)`.*/\1/p' AI_OS_REFERENCE.md | head -n1)
          pinned=$(sed -n 's/^- Pinned commit: `\([^`]*\)`.*/\1/p' AI_OS_REFERENCE.md | head -n1)
          base='https://raw.githubusercontent.com/yurikuchumov-ux/ai-operating-system'
          curl --fail --silent --show-error --location "$base/main/AI_OS.md" >/dev/null
          if [ "$mode" = pinned ]; then
            curl --fail --silent --show-error --location "$base/$pinned/AI_OS.md" >/dev/null
            latest=$(git ls-remote https://github.com/yurikuchumov-ux/ai-operating-system.git refs/heads/main | cut -f1)
            if [ "$pinned" != "$latest" ]; then
              echo "::warning::Pinned AI OS revision is not current main ($latest)."
            fi
          fi
